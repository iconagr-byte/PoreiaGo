name: Deploy VPS (Hetzner — cheap)

# Push main → SSH deploy to poreiago VM
# REQUIRED repo secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
# Setup: deploy/VM-DEPLOY.md § GitHub Actions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - run: pytest -q tests/ || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS (/opt/poreiago)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail
            if [ ! -d /opt/poreiago/.git ]; then
              echo "ERROR: /opt/poreiago is not a git repo. Clone first on the VM:"
              echo "  git clone https://github.com/iconagr-byte/PoreiaGo.git /opt/poreiago"
              exit 1
            fi
            cd /opt/poreiago
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e deploy/.env.prod -e deploy/.vapid_private.pem
            bash deploy/scripts/vm-deploy-all.sh

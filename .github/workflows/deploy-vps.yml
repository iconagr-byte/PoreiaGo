name: Deploy VPS (Hetzner — cheap)

# Push main → SSH deploy to single VPS (~5€/month)
# Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - run: pytest -q tests/ || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/poreiago
            git pull origin main
            npm ci
            export VITE_API_BASE=https://api.poreiago.com
            npm run build
            docker compose --env-file deploy/.env.prod \
              -f deploy/docker-compose.prod.yml \
              --profile bundled-db \
              up -d --build
            sleep 10
            curl -fsS https://api.poreiago.com/health || curl -fsS http://127.0.0.1:8000/health

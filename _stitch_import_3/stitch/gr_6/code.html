<style>

            box-shadow: 0 0 0 4px rgba(0, 93, 144, 0.1);

<body class="bg-background text-on-background antialiased min-h-screen flex flex-col lg:flex-row">
<!-- Note: TopAppBar and BottomNavBar are deliberately suppressed here per the 'Automatic Suppression' 
         rule for Linear/Transactional screens (Sign-up). The canvas is prioritized for the onboarding flow. -->
<!-- Left Visual Anchor (Desktop) / Top Hero (Mobile) -->
<div class="w-full h-[309px] lg:h-screen lg:w-5/12 xl:w-1/2 relative overflow-hidden flex-shrink-0 bg-surface-container">
<img class="absolute inset-0 w-full h-full object-cover" data-alt="A breathtaking, wide-angle shot of a serene mountainous landscape reflecting in a crystal-clear alpine lake during golden hour. The scene evokes a profound sense of wanderlust, tranquility, and premium travel. The lighting is soft, warm, and inviting, contrasting beautifully with the crisp, cool blues of the water and sky. This high-quality photography embodies a professional, modern lifestyle aesthetic, perfectly suited for an aspirational travel agency platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC31n1Sh3vKXe75UVc_cPmd8PlrKDQ88o9G92HuCcYe3dbaYtNCR7P2CEoLr0E50NHR_M8pqAoZEQzfCUN_uX0iYNRA6bkQL7KXASKuPWwmGQZpinGCOZV9SdnlhZxgp4Iv9zGV-SxHS0JbE2cUx-bquCbpoxCcsFchyZzhtQPGeaYzR-ta5avbu0VcnMFIxeMQZR_hOiP51HZfU3TRs1oc8GZN30xNOKEmC8iIBDC3B-JoZZ7IYbnJFGVeSZ7MsuqMdhh8-ypE0hAH"/>
<!-- Ambient Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/20 to-transparent lg:bg-gradient-to-r lg:from-black/40 lg:to-transparent"></div>
<!-- Brand Moment -->
<div class="absolute bottom-margin-mobile left-margin-mobile right-margin-mobile lg:bottom-margin-desktop lg:left-margin-desktop text-on-primary">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile lg:font-headline-xl lg:text-headline-xl mb-xs lg:mb-sm">Ανακαλύψτε το Αθέατο</h2>
<p class="font-body-md text-body-md lg:font-body-lg lg:text-body-lg text-on-primary/90 max-w-md">Επιλεγμένες εμπειρίες για τον σύγχρονο εξερευνητή. Ξεκινήστε το ταξίδι σας σήμερα.</p>
</div>
</div>
<!-- Right Form Canvas -->
<div class="w-full lg:w-7/12 xl:w-1/2 flex flex-col justify-start lg:justify-center items-center px-margin-mobile py-lg md:px-margin-desktop bg-surface rounded-t-[32px] lg:rounded-none -mt-8 lg:mt-0 relative z-10 flex-grow shadow-[0px_-20px_40px_rgba(0,0,0,0.05)] lg:shadow-none">
<div class="w-full max-w-[440px] space-y-md lg:space-y-lg">
<!-- Header -->
<div class="text-center lg:text-left">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile lg:font-headline-lg lg:text-headline-lg text-on-surface mb-xs">Δημιουργία Λογαριασμού</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Γίνετε μέλος του Voyage για απρόσκοπτο, premium ταξιδιωτικό σχεδιασμό.</p>
</div>
<!-- Sign Up Form -->
<form class="space-y-sm lg:space-y-md">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface block ml-1">Ονοματεπώνυμο</label>
<div class="relative glass-input transition-all duration-300 rounded-[16px]">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">person</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-[16px] py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary transition-colors placeholder:text-outline-variant" placeholder="Μαρία Παπαδοπούλου" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface block ml-1">Διεύθυνση Email</label>
<div class="relative glass-input transition-all duration-300 rounded-[16px]">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">mail</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-[16px] py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary transition-colors placeholder:text-outline-variant" placeholder="maria@example.com" type="email"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface block ml-1">Αριθμός Τηλεφώνου</label>
<div class="relative glass-input transition-all duration-300 rounded-[16px]">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">call</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-[16px] py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary transition-colors placeholder:text-outline-variant" placeholder="+30 690 000 0000" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface block ml-1">Κωδικός Πρόσβασης</label>
<div class="relative glass-input transition-all duration-300 rounded-[16px]">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-[16px] py-4 pl-12 pr-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary transition-colors placeholder:text-outline-variant" id="password-input" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="password-icon">visibility_off</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant ml-1 mt-1">Πρέπει να είναι τουλάχιστον 8 χαρακτήρες.</p>
</div>
<!-- Action Button -->
<div class="pt-sm">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md rounded-full py-4 px-6 shadow-[0px_10px_30px_rgba(0,93,144,0.15)] hover:-translate-y-[2px] hover:shadow-[0px_15px_40px_rgba(0,93,144,0.25)] hover:bg-on-primary-fixed-variant active:translate-y-0 active:shadow-none transition-all duration-300 ease-out" type="button">
                        Δημιουργία Λογαριασμού
                    </button>
</div>
</form>
<!-- Footer Navigation -->
<div class="text-center pt-md border-t border-surface-container-high">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Έχετε ήδη λογαριασμό; 
                    <a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors ml-1" href="#">Σύνδεση</a>
</p>
</div>
</div>
</div>
<!-- Inline script for micro-interactions -->
<script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('password-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>

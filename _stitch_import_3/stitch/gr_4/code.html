<!-- JavaScript for Interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const stars = document.querySelectorAll('#star-container button');
            const ratingText = document.getElementById('rating-text');
            const submitBtn = document.getElementById('submit-btn');
            let currentRating = 0;

            const ratingLabels = {
                1: "Καθόλου καλό",
                2: "Θα μπορούσε να είναι καλύτερο",
                3: "Ήταν εντάξει",
                4: "Πολύ καλό",
                5: "Απολύτως εκπληκτικό!"
            };

            function updateStars(rating, isHover = false) {
                stars.forEach((btn, index) => {
                    const icon = btn.querySelector('.star-icon');
                    if (index < rating) {
                        icon.style.fontVariationSettings = "'FILL' 1";
                        icon.classList.remove('text-outline-variant');
                        icon.classList.add('text-secondary-container');
                        if (isHover) icon.classList.add('scale-110');
                    } else {
                        icon.style.fontVariationSettings = "'FILL' 0";
                        icon.classList.add('text-outline-variant');
                        icon.classList.remove('text-secondary-container', 'scale-110');
                    }
                });

                if (rating > 0) {
                    ratingText.textContent = ratingLabels[rating];
                    ratingText.classList.remove('opacity-0');
                    ratingText.classList.add('opacity-100');
                } else {
                    ratingText.classList.add('opacity-0');
                    ratingText.classList.remove('opacity-100');
                }
            }

            stars.forEach((btn) => {
                const ratingVal = parseInt(btn.getAttribute('data-rating'));
                
                btn.addEventListener('mouseenter', () => updateStars(ratingVal, true));
                btn.addEventListener('mouseleave', () => updateStars(currentRating));
                
                btn.addEventListener('click', () => {
                    currentRating = ratingVal;
                    updateStars(currentRating);
                    submitBtn.removeAttribute('disabled');
                    
                    // Small click animation
                    btn.querySelector('.star-icon').classList.add('scale-125');
                    setTimeout(() => {
                        btn.querySelector('.star-icon').classList.remove('scale-125');
                    }, 150);
                });
            });
        });
    </script>

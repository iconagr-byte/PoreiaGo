api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    # Do not pin a single network name — after recreate Traefik must still
    # discover api-blue on whatever edge network Compose attached.
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "iconagr@gmail.com"
      storage: /acme/acme.json
      # TLS-ALPN-01 — works even with :80 → :443 redirect (HTTP-01 can fail).
      tlsChallenge: {}

log:
  level: INFO

accessLog: {}

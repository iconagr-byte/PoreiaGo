# AUTO-GENERATED — tenant custom domains for Traefik + Let's Encrypt
# www and apex use separate routers/certs so apex DNS lag cannot break www TLS.

http:
  routers:
    tenant-domain-www-achilliotravel-com:
      rule: Host(`www.achilliotravel.com`)
      entryPoints:
        - websecure
      service: tenant-custom-frontend
      priority: 40
      tls:
        certResolver: letsencrypt
        domains:
          - main: "www.achilliotravel.com"
      middlewares:
        - security-headers@file

    tenant-domain-apex-achilliotravel-com:
      rule: Host(`achilliotravel.com`)
      entryPoints:
        - websecure
      service: tenant-custom-frontend
      priority: 40
      tls:
        certResolver: letsencrypt
        domains:
          - main: "achilliotravel.com"
      middlewares:
        - security-headers@file

  services:
    tenant-custom-frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:80"

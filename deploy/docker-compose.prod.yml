# Production stack — DigitalOcean Droplet / AWS EC2
# Usage: docker compose --env-file .env.prod -f deploy/docker-compose.prod.yml up -d

name: aerostride-prod

services:
  traefik:
    image: traefik:v3.6.6
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_acme:/acme
    networks:
      - edge

  api-blue:
    image: ${API_IMAGE:-ghcr.io/your-org/aerostride-api:latest}
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - ./.vapid_private.pem:/run/secrets/vapid_private.pem:ro
      - api_data:/app/data
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      TICKET_JWT_SECRET: ${TICKET_JWT_SECRET}
      DRIVER_API_KEYS: ${DRIVER_API_KEYS}
      POREIAGO_DATA_DIR: /app/data
      FLEET_DRIVERS_STORE: /app/data/fleet_drivers.json
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    labels:
      - traefik.enable=true
      # Prefer env host, always also accept the production API hostname.
      - traefik.http.routers.api.rule=Host(`${API_HOST:-api.poreiago.com}`) || Host(`api.poreiago.com`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.routers.api.service=api
      - traefik.http.services.api.loadbalancer.server.port=8000
      # Sticky cookies pin clients to dead backends after recreate → timeouts / Failed to fetch.
      - traefik.docker.network=aerostride-prod_edge
    networks:
      - edge
      - internal
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  api-green:
    image: ${API_IMAGE:-ghcr.io/your-org/aerostride-api:latest}
    restart: unless-stopped
    profiles: ["bluegreen"]
    env_file: .env.prod
    volumes:
      - api_data:/app/data
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      POREIAGO_DATA_DIR: /app/data
      FLEET_DRIVERS_STORE: /app/data/fleet_drivers.json
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${API_HOST}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.services.api.loadbalancer.server.port=8000
      - traefik.http.services.api.loadbalancer.server.weight=0
    networks:
      - edge
      - internal

  worker:
    image: ${API_IMAGE:-ghcr.io/your-org/aerostride-api:latest}
    restart: unless-stopped
    command: celery -A worker.app worker -l info -Q default,aade,sms
    env_file: .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - internal

  # Use managed RDS in production; keep for single-node bootstrap only
  postgres:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    profiles: ["bundled-db"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-rls.sql:/docker-entrypoint-initdb.d/02-rls.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  wordpress:
    image: wordpress:6-php8.2-apache
    restart: unless-stopped
    profiles: ["wordpress"]
    environment:
      WORDPRESS_DB_HOST: ${WP_DB_HOST}
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
    volumes:
      - wp_data:/var/www/html
    labels:
      - traefik.enable=true
      - traefik.http.routers.wp.rule=Host(`${WP_HOST}`)
      - traefik.http.routers.wp.entrypoints=websecure
      - traefik.http.routers.wp.tls.certresolver=letsencrypt
      - traefik.http.services.wp.loadbalancer.server.port=80
    networks:
      - edge

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls.certresolver=letsencrypt
      - traefik.http.services.app.loadbalancer.server.port=80
    networks:
      - edge

volumes:
  traefik_acme:
  redis_data:
  postgres_data:
  wp_data:
  api_data:

networks:
  edge:
  internal:
    internal: true

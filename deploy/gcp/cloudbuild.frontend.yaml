# Frontend only — trigger included files: src/**, public/**, index.html, package.json
substitutions:
  _VITE_API_BASE: ''

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
      env: FIREBASE_TOKEN

steps:
  - id: build-frontend
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        if [ -z "${_VITE_API_BASE}" ]; then
          echo "ERROR: Set _VITE_API_BASE in trigger substitutions"
          exit 1
        fi
        npm ci
        export VITE_API_BASE=${_VITE_API_BASE}
        npm run build

  - id: deploy-frontend
    name: node:20
    waitFor: [build-frontend]
    secretEnv: [FIREBASE_TOKEN]
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools@13
        firebase deploy --only hosting --project "$PROJECT_ID" --config deploy/gcp/firebase.json --non-interactive

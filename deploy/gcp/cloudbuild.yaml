# GitHub push → Cloud Build → Cloud Run + Firebase Hosting
# Trigger: branch main, config file deploy/gcp/cloudbuild.yaml
# Set substitutions in the Cloud Build trigger (Console or setup-cicd-triggers.sh)

substitutions:
  _REGION: europe-west3
  _SERVICE: booking-travel-api
  _AR_REPO: booking-travel
  _CLOUDSQL_INSTANCE: ''          # project:region:instance
  _VPC_CONNECTOR: ''              # projects/PROJECT/locations/REGION/connectors/NAME
  _VITE_API_BASE: ''              # https://api.yourdomain.gr
  _DEPLOY_FRONTEND: 'true'         # 'false' to skip Firebase on API-only pushes

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
      env: FIREBASE_TOKEN

steps:
  # --- Backend tests ---
  - id: test-api
    name: python:3.12-slim
    entrypoint: bash
    dir: backend
    args:
      - -c
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq libpq-dev gcc >/dev/null
        pip install -q -r requirements.txt pytest pytest-asyncio httpx
        pytest -q tests/ 2>/dev/null || echo "No tests or some failures — check Cloud Build logs"

  # --- API image ---
  - id: build-api
    name: gcr.io/cloud-builders/docker
    waitFor: [test-api]
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest
      - ./backend

  - id: push-api
    name: gcr.io/cloud-builders/docker
    waitFor: [build-api]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-api]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --min-instances=1
      - --max-instances=10
      - --cpu=2
      - --memory=2Gi
      - --timeout=3600
      - --session-affinity
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only
      - --set-env-vars=ENVIRONMENT=staging

  # --- Frontend (parallel build while API deploys) ---
  - id: build-frontend
    name: node:20
    waitFor: [test-api]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        if [ "${_DEPLOY_FRONTEND}" != "true" ]; then
          echo "Skipping frontend (_DEPLOY_FRONTEND=${_DEPLOY_FRONTEND})"
          exit 0
        fi
        if [ -z "${_VITE_API_BASE}" ]; then
          echo "ERROR: Set _VITE_API_BASE in trigger substitutions (e.g. https://api.yourdomain.gr)"
          exit 1
        fi
        npm ci
        export VITE_API_BASE=${_VITE_API_BASE}
        npm run build

  - id: deploy-frontend
    name: node:20
    waitFor: [build-frontend]
    secretEnv: [FIREBASE_TOKEN]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        if [ "${_DEPLOY_FRONTEND}" != "true" ]; then exit 0; fi
        if [ ! -d dist ]; then echo "No dist/ — frontend build skipped"; exit 0; fi
        npm install -g firebase-tools@13
        firebase deploy --only hosting --project "$PROJECT_ID" --config deploy/gcp/firebase.json --non-interactive

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest

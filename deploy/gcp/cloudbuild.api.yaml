# API only — use trigger with included files: backend/**, deploy/gcp/cloudbuild.api.yaml
substitutions:
  _REGION: europe-west3
  _SERVICE: booking-travel-api
  _AR_REPO: booking-travel
  _CLOUDSQL_INSTANCE: ''
  _VPC_CONNECTOR: ''

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: test-api
    name: python:3.12-slim
    entrypoint: bash
    dir: backend
    args:
      - -c
      - |
        apt-get update -qq && apt-get install -y -qq libpq-dev gcc >/dev/null
        pip install -q -r requirements.txt pytest pytest-asyncio httpx
        pytest -q tests/ 2>/dev/null || true

  - id: build-api
    name: gcr.io/cloud-builders/docker
    waitFor: [test-api]
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest
      - ./backend

  - id: push-api
    name: gcr.io/cloud-builders/docker
    waitFor: [build-api]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-api]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --min-instances=1
      - --max-instances=10
      - --cpu=2
      - --memory=2Gi
      - --timeout=3600
      - --session-affinity
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --vpc-connector=${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only
      - --set-env-vars=ENVIRONMENT=staging

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest

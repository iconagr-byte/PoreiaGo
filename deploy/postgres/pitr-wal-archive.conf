# PostgreSQL Point-in-Time Recovery (PITR) — WAL archiving
# Apply to postgresql.conf on production DB host

# archive_mode = on
# archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
# wal_level = replica
# max_wal_senders = 3
# archive_timeout = 300

# Restore procedure (outline):
# 1. pg_ctl stop
# 2. rm -rf $PGDATA/*
# 3. tar -xzf base_backup.tar.gz -C $PGDATA
# 4. restore_command in recovery.conf / postgresql.auto.conf
# 5. recovery_target_time = '2026-06-21 12:00:00 UTC'
# 6. pg_ctl start


# Root entry for Cloud Build triggers that expect cloudbuild.yaml
# Same as deploy/gcp/cloudbuild.cheap.yaml

substitutions:
  _REGION: europe-west3
  _SERVICE: poreiago-api
  _AR_REPO: poreiago
  _CLOUDSQL_INSTANCE: ''
  _VITE_API_BASE: https://api.poreiago.com
  _DEPLOY_FRONTEND: 'true'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA
      - ./backend

  - id: push-api
    name: gcr.io/cloud-builders/docker
    waitFor: [build-api]
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-api]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --min-instances=0
      - --max-instances=3
      - --cpu=1
      - --memory=512Mi
      - --timeout=3600
      - --session-affinity
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --set-env-vars=ENVIRONMENT=staging

  - id: build-frontend
    name: node:20
    waitFor: ['-']
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        if [ "${_DEPLOY_FRONTEND}" != "true" ]; then exit 0; fi
        npm ci
        export VITE_API_BASE=${_VITE_API_BASE}
        npm run build

  - id: deploy-frontend
    name: node:20
    waitFor: [build-frontend]
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        if [ "${_DEPLOY_FRONTEND}" != "true" ]; then exit 0; fi
        if [ ! -d dist ]; then exit 0; fi
        npm install -g firebase-tools@13
        firebase deploy --only hosting --project "$PROJECT_ID" --config deploy/gcp/firebase.json --non-interactive

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA

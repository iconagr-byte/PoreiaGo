<!DOCTYPE html>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col md:hidden">
<!-- TopAppBar -->
<header class="bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-md text-primary dark:text-inverse-primary font-headline-md-mobile text-headline-md-mobile fixed top-0 w-full z-50 bg-transparent flex justify-between items-center px-margin-mobile h-16 w-full">
<button aria-label="Explore" class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-container-highest rounded-full p-2 transition-all duration-300 ease-in-out">
<span class="material-symbols-outlined">travel_explore</span>
</button>
<span class="font-headline-md-mobile text-headline-md-mobile font-bold text-primary dark:text-primary-fixed-dim">Voyage</span>
<button aria-label="Notifications" class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-container-highest rounded-full p-2 transition-all duration-300 ease-in-out">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow pt-[80px] pb-[100px] px-margin-mobile flex flex-col gap-md">
<div class="mb-sm">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Settings</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Manage your preferences and account details.</p>
</div>
<!-- Preferences Section -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0px_10px_30px_rgba(0,0,0,0.05)] overflow-hidden">
<h2 class="font-label-md text-label-md text-primary px-md py-sm bg-surface-container-low uppercase tracking-wider">Preferences</h2>
<div class="flex flex-col">
<!-- Language -->
<button class="flex items-center justify-between px-md py-md bg-transparent hover:bg-surface-container transition-colors border-b border-surface-container-high last:border-0 w-full text-left">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline">language</span>
<div>
<span class="font-body-md text-body-md text-on-surface block">Language</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">English (US)</span>
</div>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Currency -->
<button class="flex items-center justify-between px-md py-md bg-transparent hover:bg-surface-container transition-colors border-b border-surface-container-high last:border-0 w-full text-left">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline">payments</span>
<div>
<span class="font-body-md text-body-md text-on-surface block">Currency</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">USD ($)</span>
</div>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
</div>
</section>
<!-- Notifications Section -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0px_10px_30px_rgba(0,0,0,0.05)] overflow-hidden">
<h2 class="font-label-md text-label-md text-primary px-md py-sm bg-surface-container-low uppercase tracking-wider">Notifications</h2>
<div class="flex flex-col">
<!-- Push Notifications -->
<div class="flex items-center justify-between px-md py-md border-b border-surface-container-high last:border-0 w-full">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline">campaign</span>
<span class="font-body-md text-body-md text-on-surface block">Push Notifications</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Email Updates -->
<div class="flex items-center justify-between px-md py-md border-b border-surface-container-high last:border-0 w-full">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline">mail</span>
<span class="font-body-md text-body-md text-on-surface block">Email Updates</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
</section>
<!-- About & Legal Section -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0px_10px_30px_rgba(0,0,0,0.05)] overflow-hidden">
<h2 class="font-label-md text-label-md text-primary px-md py-sm bg-surface-container-low uppercase tracking-wider">About</h2>
<div class="flex flex-col">
<!-- Privacy Policy -->
<button class="flex items-center justify-between px-md py-md bg-transparent hover:bg-surface-container transition-colors border-b border-surface-container-high last:border-0 w-full text-left">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline">policy</span>
<span class="font-body-md text-body-md text-on-surface block">Privacy Policy</span>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Terms of Service -->
<button class="flex items-center justify-between px-md py-md bg-transparent hover:bg-surface-container transition-colors border-b border-surface-container-high last:border-0 w-full text-left">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline">description</span>
<span class="font-body-md text-body-md text-on-surface block">Terms of Service</span>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
</div>
</section>
<!-- Danger Zone Section -->
<section class="mt-md mb-lg">
<button class="w-full flex items-center justify-center gap-sm px-md py-md bg-error-container text-on-error-container rounded-xl font-label-md text-label-md hover:bg-error hover:text-on-error transition-colors">
<span class="material-symbols-outlined">delete_forever</span>
                Delete Account
            </button>
<p class="font-label-sm text-label-sm text-on-surface-variant text-center mt-sm">This action cannot be undone.</p>
</section>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface dark:bg-inverse-surface text-primary dark:text-inverse-primary font-label-md text-label-md font-headline-md text-headline-md text-primary fixed bottom-0 w-full z-50 shadow-[0px_-2px_10px_rgba(0,0,0,0.05)] bg-surface dark:bg-inverse-surface shadow-lg flex justify-around items-center px-4 py-2 w-full">
<button aria-label="Home" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-colors scale-95 active:scale-90 transition-transform duration-200 rounded-lg p-2">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm mt-1">Home</span>
</button>
<button aria-label="Search" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-colors scale-95 active:scale-90 transition-transform duration-200 rounded-lg p-2">
<span class="material-symbols-outlined">search</span>
<span class="font-label-sm text-label-sm mt-1">Search</span>
</button>

<span class="material-symbols-outlined">confirmation_number</span>
<span class="font-label-sm text-label-sm mt-1">Bookings</span>
</button>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm mt-1">Profile</span>

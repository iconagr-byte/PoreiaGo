<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#facc15" />
    <title>Χωρίς σύνδεση — GPS Οδηγού</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: #0a0a0a;
        color: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      main {
        max-width: 360px;
        text-align: center;
      }
      .icon {
        width: 88px;
        height: 88px;
        margin: 0 auto 20px;
        border-radius: 22px;
        background: #171717;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 44px;
        border: 3px solid #facc15;
      }
      h1 {
        font-size: 1.35rem;
        margin: 0 0 12px;
        color: #facc15;
      }
      p {
        margin: 0 0 10px;
        line-height: 1.55;
        color: #a3a3a3;
        font-size: 0.95rem;
      }
      button {
        margin-top: 20px;
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 16px;
        background: #facc15;
        color: #0a0a0a;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">📡</div>
      <h1>Δεν υπάρχει σύνδεση</h1>
      <p>
        Η αποστολή ζωντανής GPS θέσης χρειάζεται internet. Ελέγξτε το δίκτυο και δοκιμάστε ξανά.
      </p>
      <p>
        Το manifest επιβατών μπορεί να είναι διαθέσιμο offline αν το είχατε ανοίξει νωρίτερα στη βάρδια.
      </p>
      <button type="button" onclick="location.reload()">Δοκιμή ξανά</button>
    </main>
  </body>
</html>
